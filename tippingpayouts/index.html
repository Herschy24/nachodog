<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Footy Tipping Payouts</title>
  <style>
    body {
      font-family: sans-serif;
      padding: 1rem;
      background-image: url('sam.png');
      background-size: cover;
      background-repeat: no-repeat;
      background-position: center center;
      background-attachment: fixed;
      color: #000 !important;
      text-shadow: none !important;
    }

    #header {
      margin-bottom: 1em;
    }

    section {
      margin-bottom: 2rem;
    }

    .payout {
      margin-bottom: 0.75rem;
      border-bottom: 1px solid #ddd;
      padding-bottom: 0.5rem;
    }

    .amount {
      font-weight: bold;
    }

    .error {
      color: #c00;
    }

    .stale-warning {
      color: #b85c00;
    }

    /* Weekly bet table */
    #weekly-bet table {
      border-collapse: collapse;
      min-width: 380px;
    }
    #weekly-bet th, #weekly-bet td {
      border: 1px solid #bbb;
      padding: 0.4rem 0.75rem;
      text-align: left;
    }
    #weekly-bet th {
      background: #f0f0f0;
    }
    #weekly-bet tr.won td {
      background: #d4edda;
    }
    #weekly-bet tr.pending td {
      color: #666;
    }

    /* Essendon Watch */
    #essendon-watch .watch-boxes {
      display: flex;
      gap: 2rem;
      flex-wrap: wrap;
      margin-top: 0.5rem;
    }
    #essendon-watch .watch-box {
      border: 2px solid #c00;
      border-radius: 8px;
      padding: 1rem 1.5rem;
      text-align: center;
      background: #fff8f8;
      min-width: 260px;
    }
    #essendon-watch .timer-row {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      margin-bottom: 0.5rem;
    }
    #essendon-watch .timer-unit {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    #essendon-watch .timer-unit .val {
      font-size: 2.2rem;
      font-weight: bold;
      color: #c00;
      line-height: 1;
    }
    #essendon-watch .timer-unit small {
      font-size: 0.75rem;
      color: #888;
      text-transform: uppercase;
    }
    #essendon-watch .watch-box .watch-title {
      display: block;
      font-size: 1.1rem;
      font-weight: bold;
      color: #c00;
      margin-bottom: 0.2rem;
    }
    #essendon-watch .watch-box .watch-subtitle {
      display: block;
      font-size: 0.8rem;
      color: #555;
      margin-bottom: 0.75rem;
    }
    #essendon-watch .watch-box .label {
      font-size: 0.8rem;
      color: #888;
      display: block;
      margin-top: 0.25rem;
    }
  </style>
</head>
<body>
  <h1>Footy Tipping Payouts</h1>
  <p id="header"><em>Loading payouts…</em></p>
  <div id="payouts"></div>

  <section id="weekly-bet">
    <h2>Weekly Rolling Bet</h2>
  </section>

  <section id="essendon-watch">
    <h2>Essendon Watch 🔴</h2>
    <div class="watch-boxes">
      <div class="watch-box">
        <span class="watch-title">🏆 Last Finals Win</span>
        <span class="watch-subtitle">4 Sep 2004</span>
        <div class="timer-row">
          <span class="timer-unit"><span class="val" id="fw-d">0</span><small>days</small></span>
          <span class="timer-unit"><span class="val" id="fw-h">00</span><small>hrs</small></span>
          <span class="timer-unit"><span class="val" id="fw-m">00</span><small>min</small></span>
          <span class="timer-unit"><span class="val" id="fw-s">00</span><small>sec</small></span>
        </div>
        <span class="label">since 4 Sep 2004</span>
      </div>
      <div class="watch-box">
        <span class="watch-title">✅ Last Win</span>
        <span class="watch-subtitle">Most recent AFL match victory</span>
        <div class="timer-row">
          <span class="timer-unit"><span class="val" id="lw-d">0</span><small>days</small></span>
          <span class="timer-unit"><span class="val" id="lw-h">00</span><small>hrs</small></span>
          <span class="timer-unit"><span class="val" id="lw-m">00</span><small>min</small></span>
          <span class="timer-unit"><span class="val" id="lw-s">00</span><small>sec</small></span>
        </div>
        <span class="label">since 23 May 2025</span>
      </div>
    </div>
  </section>

  <script>
    const STARTING_AUD = 1400;          // total tipping pot collected
    const UNITS_GCQF   = 341;           // units of GCQF held
    const BUY_PRICE    = 3.96;          // purchase price per unit (AUD)
    const ROLLING_POT  = 95.90;         // current rolling weekly bet total
    const XML_PATH     = 'payouts.xml';
    const REFRESH_MS   = 300_000;       // refresh every 5 minutes

    const YAHOO_URL = 'https://query1.finance.yahoo.com/v8/finance/chart/GCQF.AX?interval=1d&range=1d';
    const PROXIES = [
      'https://api.allorigins.win/raw?url=',
      'https://corsproxy.io/?url=',
    ];

    let lastKnownPrice = null;
    let lastKnownPriceTime = null;

    async function fetchWithTimeout(url, ms = 8000) {
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), ms);
      try {
        const resp = await fetch(url, { signal: controller.signal });
        clearTimeout(timer);
        return resp;
      } catch (e) {
        clearTimeout(timer);
        throw e;
      }
    }

    async function fetchGcqfPrice() {
      let lastErr;
      for (const proxy of PROXIES) {
        try {
          const resp = await fetchWithTimeout(proxy + encodeURIComponent(YAHOO_URL), 8000);
          if (!resp.ok) throw new Error(`Proxy returned ${resp.status}`);
          const data = await resp.json();
          const price = data?.chart?.result?.[0]?.meta?.regularMarketPrice;
          if (!price || price <= 0) throw new Error('Price not found in response');
          lastKnownPrice = price;
          lastKnownPriceTime = new Date().toLocaleTimeString('en-AU');
          return price;
        } catch (e) {
          lastErr = e;
        }
      }
      throw lastErr;
    }

    async function fetchPayoutsXml() {
      // cache-busting timestamp prevents stale CDN/browser cache
      const resp = await fetch(XML_PATH + '?v=' + Date.now());
      if (!resp.ok) throw new Error('Could not load payouts.xml');
      const text = await resp.text();
      return new DOMParser().parseFromString(text, 'application/xml');
    }

    function render(xml, gcqfPrice, stale = false) {
      const finalPot   = gcqfPrice * UNITS_GCQF;
      const totalPot   = finalPot + ROLLING_POT;   // GCQF + rolling bet combined
      const invested   = BUY_PRICE * UNITS_GCQF;
      const profit     = totalPot - STARTING_AUD;
      const gainLoss   = finalPot - invested;
      const header     = document.getElementById('header');

      const profitStr   = profit >= 0   ? `+$${profit.toFixed(2)}`   : `-$${Math.abs(profit).toFixed(2)}`;
      const gainLossStr = gainLoss >= 0 ? `+$${gainLoss.toFixed(2)}` : `-$${Math.abs(gainLoss).toFixed(2)}`;

      const statusLine = stale
        ? `<span class="stale-warning">⚠ Using last known price from ${lastKnownPriceTime} · retrying in 5 min</span>`
        : `<small style="color:#888">Last updated: ${new Date().toLocaleTimeString('en-AU')} · refreshes every 5 min</small>`;

      header.innerHTML = `
        <strong>GCQF</strong> — ${UNITS_GCQF} units @ $${gcqfPrice.toFixed(4)} AUD<br/>
        GCQF value: <strong>$${finalPot.toFixed(2)}</strong> &nbsp;|&nbsp;
        Rolling bet: <strong>$${ROLLING_POT.toFixed(2)}</strong> &nbsp;|&nbsp;
        Combined: <strong>$${totalPot.toFixed(2)} AUD</strong><br/>
        vs buy price ($${BUY_PRICE}): ${gainLossStr} AUD &nbsp;|&nbsp;
        Pot P&amp;L: <strong>${profitStr} AUD</strong><br/>
        ${statusLine}
      `;

      const container = document.getElementById('payouts');
      container.innerHTML = '';

      xml.querySelectorAll('option').forEach(opt => {
        const name    = opt.getAttribute('name');
        const section = document.createElement('section');
        section.innerHTML = `<h2>${name}</h2>`;
        container.appendChild(section);

        const tiers    = Array.from(opt.querySelectorAll('tier'));
        const numTiers = tiers.length;

        tiers.forEach(tier => {
          const tierName  = tier.getAttribute('name');
          const baseRatio = parseFloat(tier.querySelector('payoutsBase').textContent);
          const tppElem   = tier.querySelector('tieredProfitPayouts');
          const tpp       = tppElem ? parseFloat(tppElem.textContent) : 0;

          let payoutAUD;
          if (name === 'Socialist') {
            if (profit < 0) {
              payoutAUD = baseRatio * totalPot;
            } else {
              payoutAUD = baseRatio * STARTING_AUD + profit / numTiers;
            }
          } else { // Capitalist
            if (profit < 0) {
              payoutAUD = baseRatio * totalPot;
            } else {
              payoutAUD = baseRatio * STARTING_AUD + profit * tpp;
            }
          }

          const div = document.createElement('div');
          div.className = 'payout';
          div.innerHTML = `
            <div><strong>Tier:</strong> ${tierName}</div>
            <div>
              <strong>Payout:</strong>
              <span class="amount">$${payoutAUD.toFixed(2)} AUD</span>
            </div>
          `;
          container.appendChild(div);
        });
      });
    }

    async function loadAndRender() {
      try {
        const [price, xml] = await Promise.all([fetchGcqfPrice(), fetchPayoutsXml()]);
        render(xml, price, false);
      } catch (err) {
        if (lastKnownPrice !== null) {
          try {
            const xml = await fetchPayoutsXml();
            render(xml, lastKnownPrice, true);
          } catch (_) {
            const hdr = document.getElementById('header');
            hdr.innerHTML = `<span class="stale-warning">⚠ Using last known price from ${lastKnownPriceTime} · retrying in 5 min</span>`;
          }
        } else {
          const hdr = document.getElementById('header');
          hdr.innerHTML = `<span class="error">Could not load GCQF price (${err.message}). Retrying in 5 min…</span>`;
        }
        setTimeout(loadAndRender, REFRESH_MS);
        return;
      }
      setTimeout(loadAndRender, REFRESH_MS);
    }

    // ── Weekly Rolling Bet ──────────────────────────────────────────────────
    const WEEKLY_BETS = [
      { person: 'Sedy',    result: 'Won', potBefore: 50.00,  potAfter: 68.50 },
      { person: 'Mosh',    result: 'Won', potBefore: 68.50,  potAfter: 95.90 },
      { person: 'Riz',     result: null },
      { person: 'Wilks',   result: null },
      { person: 'TommyC',  result: null },
      { person: 'Danny',   result: null },
      { person: 'Jonsey',  result: null },
      { person: 'Willy K', result: null },
      { person: 'Jacob',   result: null },
      { person: 'Hirsch',  result: null },
      { person: 'Sam',     result: null },
      { person: 'Mel',     result: null },
      { person: 'TK',      result: null },
      { person: 'Charlie', result: null },
    ];

    function renderWeeklyBet() {
      const section = document.getElementById('weekly-bet');
      const lastCompleted = [...WEEKLY_BETS].reverse().find(b => b.result !== null);
      const currentPot = lastCompleted ? lastCompleted.potAfter : 50.00;

      let rows = '';
      WEEKLY_BETS.forEach((b, i) => {
        if (b.result !== null) {
          rows += `<tr class="won">
            <td>${i + 1}</td>
            <td>${b.person}</td>
            <td>${b.result}</td>
            <td>$${b.potBefore.toFixed(2)}</td>
            <td>$${b.potAfter.toFixed(2)}</td>
          </tr>`;
        } else {
          rows += `<tr class="pending">
            <td>${i + 1}</td>
            <td>${b.person}</td>
            <td>—</td>
            <td>—</td>
            <td>—</td>
          </tr>`;
        }
      });

      section.innerHTML = `
        <h2>Weekly Rolling Bet</h2>
        <p>Current pot: <strong>$${currentPot.toFixed(2)}</strong></p>
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Person</th>
              <th>Result</th>
              <th>Pot Before</th>
              <th>Pot After</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      `;
    }

    // ── Essendon Watch ──────────────────────────────────────────────────────
    function tickEssendon() {
      function elapsed(dateStr) {
        const diff = Date.now() - new Date(dateStr).getTime();
        const s = Math.floor(diff / 1000) % 60;
        const m = Math.floor(diff / 60000) % 60;
        const h = Math.floor(diff / 3600000) % 24;
        const d = Math.floor(diff / 86400000);
        return { d, h, m, s };
      }
      const fw = elapsed('2004-09-04T00:00:00+10:00');
      const lw = elapsed('2025-05-23T00:00:00+10:00');
      document.getElementById('fw-d').textContent = fw.d;
      document.getElementById('fw-h').textContent = String(fw.h).padStart(2, '0');
      document.getElementById('fw-m').textContent = String(fw.m).padStart(2, '0');
      document.getElementById('fw-s').textContent = String(fw.s).padStart(2, '0');
      document.getElementById('lw-d').textContent = lw.d;
      document.getElementById('lw-h').textContent = String(lw.h).padStart(2, '0');
      document.getElementById('lw-m').textContent = String(lw.m).padStart(2, '0');
      document.getElementById('lw-s').textContent = String(lw.s).padStart(2, '0');
    }

    loadAndRender();
    renderWeeklyBet();
    tickEssendon();
    setInterval(tickEssendon, 1000);
  </script>
</body>
</html>
