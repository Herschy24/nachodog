<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Footy Tipping Payouts</title>
   <style>
    body {
      /* layout */
      font-family: sans-serif;
      padding: 1rem;
  
      /* background */
      background-image: url('sam.png');
      background-size: cover;
      background-repeat: no-repeat;
      background-position: center center;
      background-attachment: fixed;
  
      /* enforce black text */
      color: #000 !important;
      text-shadow: none !important;
    }
  
    #header {
      margin-bottom: 1em;
    }
  
    section {
      margin-bottom: 2rem;
    }
  
    .payout {
      margin-bottom: 0.75rem;
      border-bottom: 1px solid #ddd;
      padding-bottom: 0.5rem;
    }
  
    .amount {
      font-weight: bold;
    }
  
    .error {
      color: #c00;
    }
  </style>
</head>
<body>
  <h1>Footy Tipping Payouts</h1>
  <p id="header"><em>Loading payouts…</em></p>
  <div id="payouts"></div>

  <script>
    const STARTING_AUD = 1400;          // total pot collected
    const UNITS_GCQF   = 341;           // units of GCQF held
    const BUY_PRICE    = 3.96;          // purchase price per unit (AUD)
    const XML_PATH     = 'payouts.xml';
    const REFRESH_MS   = 300_000;       // refresh every 5 minutes

    // Stooq via allorigins CORS proxy — no API key needed
    const STOOQ_URL  = 'https://stooq.com/q/l/?s=gcqf.au&f=sd2t2ohlcv&h&e=csv';
    const GCQF_API   = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(STOOQ_URL);

    async function fetchGcqfPrice() {
      const resp = await fetch(GCQF_API);
      if (!resp.ok) throw new Error(`Proxy returned ${resp.status}`);
      const text = await resp.text();
      // CSV format: Symbol,Date,Time,Open,High,Low,Close,Volume
      const lines = text.trim().split('\n');
      if (lines.length < 2) throw new Error('No data in response');
      const cols = lines[1].split(',');
      const close = parseFloat(cols[6]);
      if (isNaN(close) || close <= 0) throw new Error('Invalid price in response');
      return close;
    }

    async function fetchPayoutsXml() {
      const resp = await fetch(XML_PATH);
      if (!resp.ok) throw new Error('Could not load payouts.xml');
      const text = await resp.text();
      return new DOMParser().parseFromString(text, 'application/xml');
    }

    function render(xml, gcqfPrice) {
      const finalPot   = gcqfPrice * UNITS_GCQF;
      const invested   = BUY_PRICE * UNITS_GCQF;
      const profit     = finalPot - STARTING_AUD;
      const gainLoss   = finalPot - invested;
      const header     = document.getElementById('header');

      const profitStr   = profit >= 0   ? `+$${profit.toFixed(2)}`   : `-$${Math.abs(profit).toFixed(2)}`;
      const gainLossStr = gainLoss >= 0 ? `+$${gainLoss.toFixed(2)}` : `-$${Math.abs(gainLoss).toFixed(2)}`;

      header.innerHTML = `
        <strong>GCQF</strong> — ${UNITS_GCQF} units @ $${gcqfPrice.toFixed(4)} AUD<br/>
        Current value: <strong>$${finalPot.toFixed(2)} AUD</strong> &nbsp;|&nbsp;
        vs buy price ($${BUY_PRICE}): ${gainLossStr} AUD<br/>
        Starting pot: $${STARTING_AUD.toFixed(2)} AUD &nbsp;|&nbsp;
        Pot P&amp;L: <strong>${profitStr} AUD</strong><br/>
        <small style="color:#888">Last updated: ${new Date().toLocaleTimeString('en-AU')} · refreshes every 5 min</small>
      `;

      const container = document.getElementById('payouts');
      container.innerHTML = '';

      xml.querySelectorAll('option').forEach(opt => {
        const name    = opt.getAttribute('name');
        const section = document.createElement('section');
        section.innerHTML = `<h2>${name}</h2>`;
        container.appendChild(section);

        const tiers    = Array.from(opt.querySelectorAll('tier'));
        const numTiers = tiers.length;

        tiers.forEach(tier => {
          const tierName  = tier.getAttribute('name');
          const baseRatio = parseFloat(tier.querySelector('payoutsBase').textContent);
          const tppElem   = tier.querySelector('tieredProfitPayouts');
          const tpp       = tppElem ? parseFloat(tppElem.textContent) : 0;

          let payoutAUD;
          if (name === 'Socialist') {
            if (profit < 0) {
              payoutAUD = baseRatio * finalPot;
            } else {
              payoutAUD = baseRatio * STARTING_AUD + profit / numTiers;
            }
          } else { // Capitalist
            if (profit < 0) {
              payoutAUD = baseRatio * finalPot;
            } else {
              payoutAUD = baseRatio * STARTING_AUD + profit * tpp;
            }
          }

          const div = document.createElement('div');
          div.className = 'payout';
          div.innerHTML = `
            <div><strong>Tier:</strong> ${tierName}</div>
            <div>
              <strong>Payout:</strong>
              <span class="amount">$${payoutAUD.toFixed(2)} AUD</span>
            </div>
          `;
          container.appendChild(div);
        });
      });
    }

    async function loadAndRender() {
      try {
        const [price, xml] = await Promise.all([fetchGcqfPrice(), fetchPayoutsXml()]);
        render(xml, price);
      } catch (err) {
        const hdr = document.getElementById('header');
        hdr.innerHTML = `<span class="error">Could not load GCQF price (${err.message}). Retrying in 5 min…</span>`;
        setTimeout(loadAndRender, REFRESH_MS);
        return;
      }
      setTimeout(loadAndRender, REFRESH_MS);
    }

    loadAndRender();
  </script>
</body>
</html>
