name: Fetch GCQF Price

on:
  schedule:
    # Every 15 min, Mon-Fri, 00:00-06:00 UTC = ASX market hours (10am-4pm AEST)
    - cron: '*/15 0-5 * * 1-5'
  workflow_dispatch: # allow manual trigger from Actions tab

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Install yfinance
        run: pip install yfinance

      - name: Fetch GCQF price from Yahoo Finance
        run: |
          python3 - <<'EOF'
          import yfinance as yf, json
          from datetime import datetime, timezone
          t = yf.Ticker('GCQF.AX')
          price = round(t.fast_info['last_price'], 4)
          updated = datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ')
          with open('tippingpayouts/price.json', 'w') as f:
              json.dump({'price': price, 'updated': updated}, f)
          print(f'Saved price: {price} at {updated}')
          EOF

      - name: Commit updated price
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tippingpayouts/price.json
          git diff --cached --quiet && echo "No change in price, skipping commit" || git commit -m "chore: update GCQF price [skip ci]"
          git push

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - uses: actions/deploy-pages@v4
        id: deployment
