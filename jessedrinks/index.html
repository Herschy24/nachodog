<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jesse Drinks</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Bebas+Neue&family=Inter:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0f;
    color: #fff;
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  canvas#bg {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
    opacity: 0.6;
  }

  .content {
    position: relative;
    z-index: 2;
    text-align: center;
    padding: 1rem 0.75rem;
    width: 100%;
    max-width: 100vw;
  }

  .title {
    font-family: 'Black Ops One', cursive;
    font-size: clamp(2.6rem, 13vw, 9rem);
    letter-spacing: 0.02em;
    line-height: 1;
    background: linear-gradient(135deg, #ff6b35, #f7c59f, #ff6b35);
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shine 3s linear infinite;
    text-shadow: none;
    margin-bottom: 0.15em;
  }

  .subtitle {
    font-family: 'Bebas Neue', cursive;
    font-size: clamp(1rem, 4.5vw, 2.5rem);
    letter-spacing: 0.2em;
    color: #ff6b35;
    opacity: 0.85;
    margin-bottom: clamp(1.2rem, 4vw, 3rem);
    text-transform: uppercase;
  }

  @keyframes shine {
    0% { background-position: 0% center; }
    100% { background-position: 200% center; }
  }

  /* COUNTDOWN */
  .countdown-wrap {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: clamp(0.2rem, 2vw, 2rem);
    margin-bottom: clamp(1.2rem, 4vw, 3rem);
  }

  .cd-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    flex: 1;
    max-width: 28vw;
  }

  .cd-num {
    font-family: 'Black Ops One', cursive;
    font-size: clamp(4rem, 20vw, 18rem);
    line-height: 1;
    color: #fff;
    text-shadow:
      0 0 30px rgba(255, 107, 53, 0.9),
      0 0 60px rgba(255, 107, 53, 0.4),
      0 0 2px #fff;
    width: 100%;
    text-align: center;
    display: block;
    transition: transform 0.1s;
  }

  .cd-num.pulse {
    animation: numPulse 0.3s ease-out;
  }

  @keyframes numPulse {
    0% { transform: scale(1.06); color: #ff6b35; }
    100% { transform: scale(1); color: #fff; }
  }

  .cd-label {
    font-family: 'Bebas Neue', cursive;
    font-size: clamp(0.7rem, 3vw, 1.6rem);
    letter-spacing: 0.15em;
    color: #ff6b35;
    opacity: 0.7;
    margin-top: 0.2rem;
    text-transform: uppercase;
  }

  .cd-sep {
    font-family: 'Black Ops One', cursive;
    font-size: clamp(3rem, 16vw, 14rem);
    line-height: 1;
    color: #ff6b35;
    opacity: 0.5;
    flex-shrink: 0;
    padding-bottom: 1.4rem;
  }

  /* LOCATION */
  .location-card {
    display: inline-flex;
    align-items: center;
    gap: 0.75rem;
    background: rgba(255, 107, 53, 0.1);
    border: 1px solid rgba(255, 107, 53, 0.3);
    border-radius: 1rem;
    padding: clamp(0.8rem, 3vw, 1.2rem) clamp(1rem, 5vw, 2.4rem);
    backdrop-filter: blur(10px);
    margin-bottom: clamp(0.8rem, 3vw, 1.5rem);
    max-width: calc(100vw - 2rem);
  }

  .location-icon {
    font-size: clamp(1.4rem, 5vw, 2rem);
    flex-shrink: 0;
  }

  .location-text {
    text-align: left;
  }

  .location-name {
    font-family: 'Bebas Neue', cursive;
    font-size: clamp(1.3rem, 5.5vw, 2.2rem);
    letter-spacing: 0.12em;
    color: #fff;
    line-height: 1.1;
  }

  .location-address {
    font-size: clamp(0.7rem, 2.8vw, 1rem);
    color: rgba(255, 107, 53, 0.8);
    letter-spacing: 0.03em;
  }

  .event-time {
    font-family: 'Bebas Neue', cursive;
    font-size: clamp(1.2rem, 5vw, 3rem);
    letter-spacing: 0.18em;
    color: rgba(255, 255, 255, 0.5);
  }

  /* DONE STATE */
  .done-msg {
    display: none;
    font-family: 'Black Ops One', cursive;
    font-size: clamp(2.5rem, 14vw, 10rem);
    background: linear-gradient(135deg, #ff6b35, #fff, #ff6b35);
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shine 2s linear infinite;
    padding: 0 1rem;
  }
</style>
</head>
<body>

<canvas id="bg"></canvas>

<div class="content">
  <div class="title">JESSE DRINKS</div>
  <div class="subtitle">The Reckoning</div>

  <div class="countdown-wrap" id="countdown">
    <div class="cd-block">
      <span class="cd-num" id="cd-h">00</span>
      <span class="cd-label">Hours</span>
    </div>
    <div class="cd-sep">:</div>
    <div class="cd-block">
      <span class="cd-num" id="cd-m">00</span>
      <span class="cd-label">Minutes</span>
    </div>
    <div class="cd-sep">:</div>
    <div class="cd-block">
      <span class="cd-num" id="cd-s">00</span>
      <span class="cd-label">Seconds</span>
    </div>
  </div>

  <div class="done-msg" id="done-msg">IT'S TIME 🍻</div>

  <div class="location-card">
    <div class="location-icon">📍</div>
    <div class="location-text">
      <div class="location-name">Vapiano</div>
      <div class="location-address">357 Collins Street, Melbourne</div>
    </div>
  </div>

  <div class="event-time">TODAY · 4:00 PM</div>
</div>

<script>
// Target: 4pm Melbourne time today (AEST = UTC+10, AEDT = UTC+11)
// 2026-05-22 is autumn in Melbourne = AEST (UTC+10)
// So 4pm AEST = 06:00 UTC
const target = new Date('2026-05-22T06:00:00Z');

function pad(n) { return String(n).padStart(2, '0'); }

const elH = document.getElementById('cd-h');
const elM = document.getElementById('cd-m');
const elS = document.getElementById('cd-s');
const elDone = document.getElementById('done-msg');
const elCountdown = document.getElementById('countdown');

let prevH = '', prevM = '', prevS = '';

function tick() {
  const now = new Date();
  const diff = target - now;

  if (diff <= 0) {
    elCountdown.style.display = 'none';
    elDone.style.display = 'block';
    startFireworks();
    return;
  }

  const totalSecs = Math.floor(diff / 1000);
  const h = Math.floor(totalSecs / 3600);
  const m = Math.floor((totalSecs % 3600) / 60);
  const s = totalSecs % 60;

  const hStr = pad(h), mStr = pad(m), sStr = pad(s);

  if (hStr !== prevH) { elH.textContent = hStr; pulse(elH); prevH = hStr; }
  if (mStr !== prevM) { elM.textContent = mStr; pulse(elM); prevM = mStr; }
  if (sStr !== prevS) { elS.textContent = sStr; pulse(elS); prevS = sStr; }
}

function pulse(el) {
  el.classList.remove('pulse');
  void el.offsetWidth;
  el.classList.add('pulse');
}

tick();
setInterval(tick, 1000);

// === Animated background: rising bubbles / drink effect ===
const canvas = document.getElementById('bg');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const bubbles = [];
for (let i = 0; i < 80; i++) {
  bubbles.push({
    x: Math.random() * window.innerWidth,
    y: Math.random() * window.innerHeight,
    r: Math.random() * 6 + 1,
    speed: Math.random() * 1.2 + 0.3,
    opacity: Math.random() * 0.5 + 0.1,
    wobble: Math.random() * Math.PI * 2,
    wobbleSpeed: (Math.random() - 0.5) * 0.03
  });
}

function drawBg() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Gradient background
  const grad = ctx.createLinearGradient(0, canvas.height, canvas.width, 0);
  grad.addColorStop(0, 'rgba(20, 5, 0, 0.95)');
  grad.addColorStop(0.5, 'rgba(40, 10, 5, 0.9)');
  grad.addColorStop(1, 'rgba(15, 5, 20, 0.95)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Glow orb
  const orb = ctx.createRadialGradient(
    canvas.width * 0.5, canvas.height * 0.5, 0,
    canvas.width * 0.5, canvas.height * 0.5, canvas.width * 0.5
  );
  orb.addColorStop(0, 'rgba(255, 107, 53, 0.15)');
  orb.addColorStop(1, 'rgba(255, 107, 53, 0)');
  ctx.fillStyle = orb;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Bubbles rising
  for (const b of bubbles) {
    b.y -= b.speed;
    b.wobble += b.wobbleSpeed;
    b.x += Math.sin(b.wobble) * 0.5;
    if (b.y + b.r < 0) {
      b.y = canvas.height + b.r;
      b.x = Math.random() * canvas.width;
    }
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(255, 150, 80, ${b.opacity})`;
    ctx.lineWidth = 1;
    ctx.stroke();
    // Inner highlight
    ctx.beginPath();
    ctx.arc(b.x - b.r * 0.3, b.y - b.r * 0.3, b.r * 0.25, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255, 220, 180, ${b.opacity * 0.8})`;
    ctx.fill();
  }

  requestAnimationFrame(drawBg);
}
drawBg();

// === Fireworks for when countdown hits zero ===
let fireworksActive = false;
const fwCanvas = document.createElement('canvas');
fwCanvas.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;z-index:10;pointer-events:none;';
document.body.appendChild(fwCanvas);
const fwCtx = fwCanvas.getContext('2d');

function resize2() { fwCanvas.width = window.innerWidth; fwCanvas.height = window.innerHeight; }
resize2();
window.addEventListener('resize', resize2);

const particles = [];

function spawnFirework() {
  const x = Math.random() * fwCanvas.width;
  const y = Math.random() * fwCanvas.height * 0.6;
  const hue = Math.random() * 60 + 10; // oranges and reds
  for (let i = 0; i < 80; i++) {
    const angle = (Math.PI * 2 / 80) * i;
    const speed = Math.random() * 6 + 2;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      decay: Math.random() * 0.015 + 0.01,
      r: Math.random() * 3 + 1,
      hue
    });
  }
}

function drawFireworks() {
  fwCtx.fillStyle = 'rgba(0,0,0,0.15)';
  fwCtx.fillRect(0, 0, fwCanvas.width, fwCanvas.height);

  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.12;
    p.vx *= 0.98;
    p.life -= p.decay;
    if (p.life <= 0) { particles.splice(i, 1); continue; }
    fwCtx.beginPath();
    fwCtx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
    fwCtx.fillStyle = `hsla(${p.hue}, 100%, 65%, ${p.life})`;
    fwCtx.fill();
  }

  if (fireworksActive) {
    if (Math.random() < 0.08) spawnFirework();
    requestAnimationFrame(drawFireworks);
  }
}

function startFireworks() {
  if (fireworksActive) return;
  fireworksActive = true;
  spawnFirework();
  spawnFirework();
  drawFireworks();
}
</script>
</body>
</html>
